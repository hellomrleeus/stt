<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SST 题目练习与答案对比</title>
    <style>
      :root {
        --bg: #f1f8ff;
        --panel: #ffffff;
        --panel-soft: #f7fbff;
        --text: #1b2b40;
        --muted: #627188;
        --line: #d8e4ef;
        --primary: #168aad;
        --primary-strong: #0f6d89;
        --danger-bg: #ffe9e9;
        --danger-text: #bf1e2e;
        --extra-bg: #e8f8ea;
        --extra-text: #1f7a34;
        --shadow: 0 12px 32px rgba(18, 63, 87, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1000px 500px at 95% -20%, rgba(37, 191, 157, 0.2), transparent 70%),
          radial-gradient(1000px 500px at -20% -20%, rgba(21, 111, 173, 0.2), transparent 70%),
          var(--bg);
      }

      .page {
        width: min(1200px, calc(100% - 32px));
        margin: 28px auto 40px;
      }

      .hero {
        background: linear-gradient(135deg, rgba(21, 140, 173, 0.18), rgba(66, 188, 145, 0.16));
        border: 1px solid rgba(24, 105, 133, 0.2);
        box-shadow: var(--shadow);
        border-radius: 18px;
        padding: 18px 22px;
        animation: slide-down 0.6s ease both;
      }

      .hero h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.3px;
      }

      .hero p {
        margin: 10px 0 0;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .table-wrap {
        margin-top: 18px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        min-width: 980px;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: linear-gradient(180deg, #eff7ff 0%, #e6f2ff 100%);
        color: #1d4863;
        font-size: 14px;
        letter-spacing: 0.4px;
        padding: 14px 12px;
        text-align: left;
        border-bottom: 1px solid var(--line);
      }

      tbody tr {
        animation: fade-up 0.45s ease both;
        animation-delay: calc(var(--i, 0) * 45ms);
      }

      tbody tr + tr td {
        border-top: 1px solid #edf3f8;
      }

      td {
        padding: 12px;
        vertical-align: top;
      }

      td.id-cell {
        width: 82px;
        text-align: center;
        font-weight: 700;
        color: #0f5f78;
      }

      td.title-cell {
        width: 180px;
        line-height: 1.45;
      }

      td.answer-cell {
        width: 40%;
      }

      td.compare-cell {
        width: 36%;
      }

      .answer-input {
        width: 100%;
        min-height: 112px;
        resize: vertical;
        border: 1px solid #cfe0ee;
        border-radius: 12px;
        background: var(--panel-soft);
        font-size: 14px;
        line-height: 1.6;
        padding: 10px 12px;
        transition: border-color 0.2s ease, box-shadow 0.25s ease;
      }

      .answer-input:focus {
        outline: none;
        border-color: #62b9dc;
        box-shadow: 0 0 0 4px rgba(57, 155, 196, 0.16);
      }

      .toggle-btn {
        border: 0;
        background: linear-gradient(135deg, var(--primary), #3cb798);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        border-radius: 999px;
        padding: 9px 14px;
        cursor: pointer;
        transition: transform 0.18s ease, filter 0.18s ease;
      }

      .toggle-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
      }

      .toggle-btn:active {
        transform: translateY(0);
      }

      .result-panel {
        margin-top: 0;
        padding: 0 14px;
        border-radius: 14px;
        background: #f7fcff;
        border: 1px solid rgba(28, 127, 162, 0.2);
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transform: translateY(-8px);
        transition:
          max-height 0.45s ease,
          opacity 0.3s ease,
          transform 0.35s ease,
          margin-top 0.35s ease,
          padding 0.35s ease;
      }

      .result-panel.open {
        margin-top: 10px;
        padding: 14px;
        max-height: 900px;
        opacity: 1;
        transform: translateY(0);
      }

      .metrics {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
      }

      .metrics b {
        color: #0d8a3f;
        margin-left: 6px;
      }

      .hint {
        font-size: 13px;
        color: #57687b;
        margin-bottom: 10px;
      }

      .origin-block {
        border: 1px dashed #c7dae8;
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
        margin-bottom: 10px;
      }

      .origin-title {
        font-size: 13px;
        font-weight: 700;
        color: #1c5370;
      }

      .origin-text {
        margin-top: 6px;
        white-space: pre-wrap;
        line-height: 1.55;
        font-size: 14px;
      }

      .compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .side {
        border: 1px solid #d6e3ee;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .side h4 {
        margin: 0;
        padding: 8px 10px;
        font-size: 13px;
        color: #48617a;
        background: #f0f7ff;
        border-bottom: 1px solid #dce8f2;
      }

      .tokens {
        margin: 0;
        min-height: 84px;
        padding: 10px;
        line-height: 1.75;
        white-space: normal;
        word-break: break-word;
        font-size: 14px;
      }

      .token {
        display: inline-block;
        margin-right: 5px;
        margin-bottom: 3px;
        border-radius: 6px;
        padding: 1px 3px;
        transition: background-color 0.22s ease, color 0.22s ease;
      }

      .token.missing,
      .token.typo {
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .token.extra {
        background: var(--extra-bg);
        color: var(--extra-text);
      }

      .empty-tip {
        color: #92a1b2;
      }

      .error {
        margin-top: 18px;
        border: 1px solid #f0b7bf;
        background: #fff3f5;
        color: #b02b3b;
        border-radius: 12px;
        padding: 14px;
      }

      @keyframes slide-down {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 980px) {
        .page {
          width: calc(100% - 18px);
          margin-top: 18px;
        }

        table {
          min-width: 0;
        }

        thead {
          display: none;
        }

        tbody tr {
          display: block;
          margin: 12px;
          border: 1px solid #dce7f1;
          border-radius: 12px;
          background: #fff;
        }

        tbody tr + tr td {
          border-top: 0;
        }

        td {
          display: grid;
          grid-template-columns: 76px 1fr;
          gap: 8px;
          align-items: start;
          padding: 9px 11px;
        }

        td::before {
          content: attr(data-label);
          color: #57728a;
          font-size: 13px;
          font-weight: 600;
          padding-top: 3px;
        }

        td.id-cell {
          text-align: left;
        }

        .compare {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>SST 文本对比练习</h1>
        <p>
          4 列表格：题号、标题、答题区、答案/对比。点击“查看答案并对比”后会显示 C 列原文答案，并按单词逐个对比。
          红色表示缺少或拼写错误，绿色表示多出的单词。
        </p>
      </header>

      <div id="errorBox" class="error" hidden></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>题号</th>
              <th>标题</th>
              <th>答题区</th>
              <th>答案 / 对比</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const bodyEl = document.getElementById("tableBody");
      const errorBoxEl = document.getElementById("errorBox");
      const QUESTIONS = [
        {
          id: "1",
          title: "Rail Pass",
          answer:
            "The Rail Pass is a special type of transit card. It also offers discounts on other services. However, the Rail Pass has time limits.",
        },
        {
          id: "2",
          title: "Park Cleaning",
          answer:
            "One team takes charge of garbage collection,another team identifies plants that don’t belong there, and the last team handles painting and repainting.",
        },
        {
          id: "3",
          title: "Washing Food",
          answer:
            "People should clean fruits and vegetables with cold water to remove dirt. However, pre-washed produce doesn’t need additional cleaning.",
        },
        {
          id: "4",
          title: "Skilled trades",
          answer:
            "Skilled trades play an important role in Canada’s economy. In addition, immigration policy can provide job security, competitive salaries and potential growth for many.",
        },
        {
          id: "5",
          title: "Phone Interview",
          answer:
            "In a phone interview how you talk is crucial, you must be confident, talk with energy, pause, listen,and keep the conversation going when you talk to a robot.",
        },
        {
          id: "6",
          title: "Orientation",
          answer:
            "Orientations are training for new employees, but some are boring and a waste of time. Small sessions, well-planned training, and separating sections are more effective.",
        },
        {
          id: "7",
          title: "Job interview",
          answer:
            "What a manager is seeking in an interview is your ability to communicate, describe, and deliver your thoughts, experiences, and stories.",
        },
        {
          id: "8",
          title: "First Day in School",
          answer:
            "Remember the teachers’ names and classroom numbers, and don’t forget to prepare money for lunch on the first day.",
        },
      ];

      const escapeHtml = (text) =>
        text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const normalizeText = (text) =>
        String(text || "")
          .replace(/[‘’]/g, "'")
          .replace(/[“”]/g, '"')
          .replace(/\u00a0/g, " ")
          .replace(/\s+/g, " ")
          .trim();

      const tokenizeWords = (text) => {
        const normalized = normalizeText(text);
        if (!normalized) return [];
        const matches = normalized.match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/g);
        return matches || [];
      };

      function levenshtein(a, b) {
        const s = a.toLowerCase();
        const t = b.toLowerCase();
        const rows = s.length + 1;
        const cols = t.length + 1;
        const dp = Array.from({ length: rows }, (_, i) => {
          const row = new Array(cols).fill(0);
          row[0] = i;
          return row;
        });
        for (let j = 0; j < cols; j += 1) dp[0][j] = j;
        for (let i = 1; i < rows; i += 1) {
          for (let j = 1; j < cols; j += 1) {
            const cost = s[i - 1] === t[j - 1] ? 0 : 1;
            dp[i][j] = Math.min(
              dp[i - 1][j] + 1,
              dp[i][j - 1] + 1,
              dp[i - 1][j - 1] + cost
            );
          }
        }
        return dp[s.length][t.length];
      }

      function isLikelyTypo(expectedWord, userWord) {
        if (!expectedWord || !userWord) return false;
        const dist = levenshtein(expectedWord, userWord);
        const maxLen = Math.max(expectedWord.length, userWord.length);
        if (maxLen <= 4) return dist <= 1;
        return dist <= 2 || dist / maxLen <= 0.34;
      }

      function computeWordDiff(referenceWords, userWords) {
        const ref = referenceWords.map((word) => word.toLowerCase());
        const usr = userWords.map((word) => word.toLowerCase());
        const m = ref.length;
        const n = usr.length;

        const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
        for (let i = 1; i <= m; i += 1) {
          for (let j = 1; j <= n; j += 1) {
            if (ref[i - 1] === usr[j - 1]) {
              dp[i][j] = dp[i - 1][j - 1] + 1;
            } else {
              dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
          }
        }

        const ops = [];
        let i = m;
        let j = n;
        while (i > 0 || j > 0) {
          if (i > 0 && j > 0 && ref[i - 1] === usr[j - 1]) {
            ops.push({ type: "equal", refIndex: i - 1, userIndex: j - 1 });
            i -= 1;
            j -= 1;
          } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
            ops.push({ type: "insert", userIndex: j - 1 });
            j -= 1;
          } else {
            ops.push({ type: "delete", refIndex: i - 1 });
            i -= 1;
          }
        }
        ops.reverse();

        const refined = [];
        for (let k = 0; k < ops.length; k += 1) {
          const current = ops[k];
          const next = ops[k + 1];
          if (next) {
            const isPair =
              (current.type === "delete" && next.type === "insert") ||
              (current.type === "insert" && next.type === "delete");
            if (isPair) {
              const del = current.type === "delete" ? current : next;
              const ins = current.type === "insert" ? current : next;
              const expectedWord = referenceWords[del.refIndex];
              const userWord = userWords[ins.userIndex];
              if (isLikelyTypo(expectedWord, userWord)) {
                refined.push({
                  type: "typo",
                  refIndex: del.refIndex,
                  userIndex: ins.userIndex,
                });
                k += 1;
                continue;
              }
            }
          }
          refined.push(current);
        }

        const refTag = new Array(referenceWords.length).fill("ok");
        const userTag = new Array(userWords.length).fill("ok");
        let matched = 0;
        let missing = 0;
        let extra = 0;
        let typo = 0;

        for (const op of refined) {
          if (op.type === "equal") {
            matched += 1;
          } else if (op.type === "delete") {
            refTag[op.refIndex] = "missing";
            missing += 1;
          } else if (op.type === "insert") {
            userTag[op.userIndex] = "extra";
            extra += 1;
          } else if (op.type === "typo") {
            refTag[op.refIndex] = "typo";
            userTag[op.userIndex] = "typo";
            typo += 1;
          }
        }

        const refCount = referenceWords.length;
        const penalty = missing + typo + extra * 0.5;
        const accuracy = refCount === 0 ? 100 : (matched / refCount) * 100;
        const score = refCount === 0 ? 10 : Math.max(0, 10 - (penalty / refCount) * 10);

        return { refTag, userTag, matched, missing, extra, typo, accuracy, score };
      }

      function buildTokenHtml(words, tags) {
        if (!words.length) return '<span class="empty-tip">暂无文本</span>';
        return words
          .map((word, i) => {
            const cls = tags[i] && tags[i] !== "ok" ? `token ${tags[i]}` : "token";
            return `<span class="${cls}">${escapeHtml(word)}</span>`;
          })
          .join(" ");
      }

      function updateCompare(ctx) {
        const inputText = ctx.textarea.value;
        const refWords = tokenizeWords(ctx.answer);
        const userWords = tokenizeWords(inputText);
        const result = computeWordDiff(refWords, userWords);

        ctx.matchRateEl.textContent = `${result.accuracy.toFixed(1)}%`;
        ctx.scoreEl.textContent = `${result.score.toFixed(1)}/10`;
        ctx.userTokensEl.innerHTML = buildTokenHtml(userWords, result.userTag);
        ctx.refTokensEl.innerHTML = buildTokenHtml(refWords, result.refTag);
      }

      function createRow(question, index) {
        const row = document.createElement("tr");
        row.style.setProperty("--i", String(index));

        row.innerHTML = `
          <td class="id-cell" data-label="题号">${escapeHtml(question.id)}</td>
          <td class="title-cell" data-label="标题">${escapeHtml(question.title)}</td>
          <td class="answer-cell" data-label="答题区">
            <textarea class="answer-input" placeholder="请输入你的答案..."></textarea>
          </td>
          <td class="compare-cell" data-label="答案/对比">
            <button type="button" class="toggle-btn">查看答案并对比</button>
            <div class="result-panel">
              <div class="metrics">
                <span>匹配率：<b class="match-rate">0%</b></span>
                <span>得分：<b class="score">0/10</b></span>
              </div>
              <div class="hint">提示：红色 = 缺少/拼写错误；绿色 = 多出的单词</div>
              <div class="origin-block">
                <div class="origin-title">原文答案（Excel C列）</div>
                <div class="origin-text">${escapeHtml(question.answer)}</div>
              </div>
              <div class="compare">
                <section class="side">
                  <h4>你的答案</h4>
                  <p class="tokens user-tokens"></p>
                </section>
                <section class="side">
                  <h4>原文答案</h4>
                  <p class="tokens ref-tokens"></p>
                </section>
              </div>
            </div>
          </td>
        `;

        const textarea = row.querySelector(".answer-input");
        const toggleBtn = row.querySelector(".toggle-btn");
        const panel = row.querySelector(".result-panel");
        const matchRateEl = row.querySelector(".match-rate");
        const scoreEl = row.querySelector(".score");
        const userTokensEl = row.querySelector(".user-tokens");
        const refTokensEl = row.querySelector(".ref-tokens");

        const ctx = {
          textarea,
          answer: question.answer,
          matchRateEl,
          scoreEl,
          userTokensEl,
          refTokensEl,
        };

        const refresh = () => updateCompare(ctx);

        toggleBtn.addEventListener("click", () => {
          panel.classList.toggle("open");
          if (panel.classList.contains("open")) {
            toggleBtn.textContent = "收起答案";
            refresh();
          } else {
            toggleBtn.textContent = "查看答案并对比";
          }
        });

        textarea.addEventListener("input", () => {
          if (panel.classList.contains("open")) refresh();
        });

        return row;
      }

      function loadQuestions() {
        try {
          const questions = QUESTIONS;
          if (!Array.isArray(questions) || questions.length === 0) {
            throw new Error("内嵌题目数据为空。");
          }
          bodyEl.innerHTML = "";
          questions.forEach((question, index) => {
            bodyEl.appendChild(createRow(question, index));
          });
        } catch (err) {
          errorBoxEl.hidden = false;
          errorBoxEl.textContent = `加载失败：${err.message}`;
        }
      }

      loadQuestions();
    </script>
  </body>
</html>
